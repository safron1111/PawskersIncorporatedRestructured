PART {
    name = FuPTank-s125-d125
    module = Part
    author = Jeb Mothman
    rescaleFactor = 1.0
    scale = 1.0
    TechRequired = nuclearPropulsion
    entryCost = 60000
    cost = 45250
    category = FuelTank
    subcategory = 0
    title = Fusion Pellets Tank 1.25m Small
    manufacturer = Restructured Pawskers Incorporated
    description = Stores fusion pellets for all your ICF drive needs!
    attachRules = 1,0,1,1,0
    mass = 0.125
    dragModelType = default
    maximum_drag = 0.2
    minimum_drag = 0.15
    angularDrag = 2
    crashTolerance = 8
    breakingForce = 200
    breakingTorque = 200
    maxTemp = 1700
    MODEL {
