    NODE {
        name = bottom
        transform = node_stack_bottom
        size = 1
        method = FIXED_JOINT
        crossfeed = True
        rigid = False
    }

}
@PART[FuPTank-s125-d125]:NEEDS[ModularStorageContainer]:FOR[PawskersIncRestructured] {
    MODULE {
        name = ModuleStorageContainer
        availableVolume = 1.465
        Container {
            name = Resource
            volume = 1.465
            FusionPellets = 300, 300
        }

    }

}

