                speed = 0.0 0.5
                speed = 1.0 1.4
                energy = 0.0 0.5
                energy = 0.5 1.0
                energy = 1.0 1.5
            }

            PREFAB_PARTICLE {
                name = light
                prefabName = fx_exhaustLight_blue
                transformName = flameTransform
                emission = 0.0 0.0
                emission = 0.05 1.0
                emission = 0.5 2.0
                emission = 1.0 4.0
