PART {
    name = FeRAMorone
    module = Part
    author = Jeb Mothman
    rescaleFactor = 1.0
    scale = 1.0
    TechRequired = nuclearPropulsion
    entryCost = 570000
    cost = 120000
    category = Engine
    subcategory = 0
    title = FeR-A "Morone"
    manufacturer = Restructured Pawskers Incorporated
    description = This bite-sized spherical tokamak based fusion engine is great for long distance interplanetary stages. Named after the striped bass when the designers misheard that all fusion engines produced must be ef-FISH-ent.
    attachRules = 1,0,1,1,0
    mass = 4.8
    dragModelType = default
    maximum_drag = 0.2
    minimum_drag = 0.2
    angularDrag = 2
    crashTolerance = 8
    breakingForce = 5000
    breakingTorque = 5000
    maxTemp = 2600
    heatConductivity = 0.005
