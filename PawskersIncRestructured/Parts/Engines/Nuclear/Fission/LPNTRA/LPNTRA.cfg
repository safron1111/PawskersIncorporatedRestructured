PART {
    name = LPNTRA
    module = Part
    author = Jeb Mothman
    rescaleFactor = 1.0
    scale = 1.0
    TechRequired = nuclearPropulsion
    entryCost = 60000
    cost = 20000
    category = Engine
    subcategory = 0
    title = LPNTR-A "Hardtack-Newsreel"
    manufacturer = Restructured Pawskers Incorporated
    description = Conceptualized by Ramsthaler Kerman and Leyse Kerman, the Low Pressure Nuclear Thermal Rocket uses extremely high temperatures to dissociate molecular hydrogen in monatomic hydrogen to achieve performance close to the limit of solid core NTRs. Despite its namesake, it is not advised to detonate this engine in high atmosphere.
    attachRules = 1,0,1,0,0
    mass = 1.25
    dragModelType = default
    maximum_drag = 0.2
    minimum_drag = 0.2
    angularDrag = 2
    crashTolerance = 8
    breakingForce = 5000
    breakingTorque = 5000
    maxTemp = 3700
    heatConductivity = 0.06
    emissiveConstant = 0.85
    radiatorMax = 0.35
    bulkheadProfiles = size3
    MODEL {
        model = PawskersIncRestructured/Parts/Engines/Nuclear/Fission/LPNTRA/LPNTRA
        position = 0, 0, 0
        rotation = 0, 0, 0
        scale = 1, 1, 1
    }

    EFFECTS {
        engage {
            AUDIO {
                channel = Ship
                clip = sound_vent_medium
                volume = 1.0
                pitch = 2.0
                loop = false
            }

        }

        disengage {
            AUDIO {
                channel = Ship
                clip = sound_vent_soft
                volume = 1.0
                pitch = 1.0
                loop = false
            }

        }

        flameout {
            PREFAB_PARTICLE {
                prefabName = fx_exhaustSparks_flameout_2
                transformName = thrustTransform
                oneShot = true
            }

            AUDIO {
                channel = Ship
                clip = sound_explosion_low
                volume = 1.0
                pitch = 2.0
                loop = false
            }

        }

        fx-ht {
            AUDIO {
                channel = Ship
                clip = sound_rocket_hard
                volume = 0.0 0.0
                volume = 1.0 1.0
                pitch = 0.0 0.2
                pitch = 1.0 1.0
                loop = true
            }

            PREFAB_PARTICLE {
                name = flame
                prefabName = fx_exhaustFlame_blue
                transformName = flameTransform
                emission = 0.0 0.0
                emission = 0.05 3.0
                emission = 0.5 8.0
                emission = 1.0 11.0
                speed = 0.0 0.5
                speed = 1.0 1.0
                localOffset = 0, 0, 0
            }

            PREFAB_PARTICLE {
                name = light
                prefabName = fx_exhaustLight_blue
                transformName = flameTransform
                emission = 0.0 0.0
                emission = 0.05 2.0
                emission = 0.5 4.0
                emission = 1.0 8.0
                speed = 0.0 0.5
                speed = 1.0 0.8
                localOffset = 0, 0, 0
            }

        }

        fx-dm {
            AUDIO {
                channel = Ship
                clip = sound_rocket_hard
                volume = 0.0 0.0
                volume = 1.0 0.8
                pitch = 0.0 0.2
                pitch = 1.0 0.8
                loop = true
            }

            PREFAB_PARTICLE {
                name = flame
                prefabName = fx_exhaustFlame_blue
                transformName = flameTransform
                emission = 0.0 0.0
                emission = 0.05 1.0
                emission = 0.5 3.5
                emission = 1.0 5.0
                speed = 0.0 0.5
                speed = 1.0 2.4
                localOffset = 0, 0, 0
            }

            PREFAB_PARTICLE {
                name = light
                prefabName = fx_exhaustLight_blue
                transformName = flameTransform
                emission = 0.0 0.0
                emission = 0.05 1.0
                emission = 0.5 2.0
                emission = 1.0 4.0
                speed = 0.0 0.5
                speed = 1.0 2.0
                localOffset = 0, 0, 0
            }

        }

    }

    MODULE {
        name = MultiModeEngine
        primaryEngineID = highThrust
        secondaryEngineID = dualMode
        primaryEngineModeDisplayName = HighThrust
        secondaryEngineModeDisplayName = DualMode
    }

    MODULE {
        name = ModuleEnginesFX
        engineID = highThrust
        runningEffectName = fx-ht
        thrustVectorTransformName = thrustTransform
        exhaustDamage = True
        ignitionThreshold = 0.1
        minThrust = 0
        maxThrust = 73
        heatProduction = 400
        fxOffset = 0, 0, 1
        EngineType = Nuclear
        exhaustDamageDistanceOffset = 1.86
        PROPELLANT {
            name = LqdHydrogen
            ratio = 1.0
            DrawGauge = True
        }

        atmosphereCurve {
            key = 0 1210
            key = 1 242
            key = 2 48
            key = 10 0.001
        }

    }

    MODULE {
        name = ModuleEnginesFX
        engineID = dualMode
        runningEffectName = fx-dm
        thrustVectorTransformName = thrustTransform
        exhaustDamage = True
        ignitionThreshold = 0.1
        minThrust = 0
        maxThrust = 15
        heatProduction = 520
        fxOffset = 0, 0, 1
        EngineType = Nuclear
        exhaustDamageDistanceOffset = 1.26
        PROPELLANT {
            name = LqdHydrogen
            ratio = 1.0
            DrawGauge = True
        }

        atmosphereCurve {
            key = 0 1350
            key = 1 135
            key = 2 13.5
            key = 10 0.001
        }

    }

    MODULE {
        name = ModuleAlternator
        preferMultiMode = true
        RESOURCE {
            name = ElectricCharge
            rate = 3.0
        }

    }

    MODULE {
        name = ModuleSurfaceFX
        thrustProviderModuleIndex = 0
        fxMax = 0.7
        maxDistance = 50
        falloff = 2.5
        thrustTransformName = thrustTransform
    }

    MODULE {
        name = ModuleJettison
        jettisonName = ShroudL
        bottomNodeName = bottom
        isFairing = False
        jettisonedObjectMass = 0.5
        jettisonForce = 1
        jettisonDirection = 0 -1 0
        actionSuffix = #autoLOC_8012024
        useProceduralDragCubes = true
    }

    MODULE {
        name = ModuleJettison
        jettisonName = ShroudR
        bottomNodeName = bottom
        isFairing = False
        jettisonedObjectMass = 0.5
        jettisonForce = 1
        jettisonDirection = 0 1 0
        actionSuffix = #autoLOC_8012025
        useProceduralDragCubes = true
    }

    MODULE {
        name = FXModuleThrottleEffects
        fxModuleNames = heatColor
        responseSpeed = 1.0
        dependOnEngineState = True
        dependOnThrottle = True
        preferMultiMode = True
    }

    MODULE {
        name = ModuleColorChanger
        moduleID = heatColor
        animRate = 0.025
        shaderProperty = _EmissiveColor
        toggleInEditor = false
        toggleInFlight = false
        redCurve {
            key = 0 0 1 1
            key = 1 1 1 1
        }

        greenCurve {
            key = 0 0 1 1
            key = 1 1 1 1
        }

        blueCurve {
            key = 0 0 1 1
            key = 1 1 1 1
        }

        alphaCurve {
            key = 0 0 1 1
            key = 1 1 1 1
        }

    }

