            test = GT
            value = 1000
            prestige = Exceptional
        }

        CONSTRAINT {
            type = ALTITUDEENV
            test = LT
            value = 2000
            prestige = Exceptional
        }

        CONSTRAINT {
            type = ALTITUDE
            test = LT
            value = 300000
            situationMask = 16
            body = _NotSun
        }

        CONSTRAINT {
            type = ALTITUDE
            test = LT
            value = 600000
            situationMask = 32
            body = _NotSun
        }

        CONSTRAINT {
            type = SPEED
            test = GT
            value = 0
            situationMask = 8
            prestige = Trivial
        }

        CONSTRAINT {
            type = SPEED
            test = LT
