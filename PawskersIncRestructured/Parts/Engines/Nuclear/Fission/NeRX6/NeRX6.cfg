PART {
    name = NeRX6
    module = Part
    author = Jeb Mothman
    rescaleFactor = 1.0
    scale = 1.0
    TechRequired = nuclearPropulsion
    entryCost = 60000
    cost = 20000
    category = Engine
    subcategory = 0
    title = NeRX-6 "Buster-Jangle"
    manufacturer = Restructured Pawskers Incorporated
    description = Modified from old KSA blueprints, the NeRX-6 provides both high ISP and moderate thrust. Named after the 'scientific' test of the same name, it's great for blasting it's way through space. (Note that the reactor core should not be blasted open). Able to operate with both liquid hydrogen and liquid fuel, allowing for effeciency or compactness.
    attachRules = 1,0,1,0,0
    mass = 4.25
    dragModelType = default
    maximum_drag = 0.2
    minimum_drag = 0.2
    angularDrag = 2
    crashTolerance = 8
    breakingForce = 5000
    breakingTorque = 5000
    maxTemp = 3100
    heatConductivity = 0.06
    emissiveConstant = 0.85
    radiatorMax = 0.35
    bulkheadProfiles = size1
    MODEL {
        model = PawskersIncRestructured/Parts/Engines/Nuclear/Fission/NeRX6/NeRX6
        position = 0, 0, 0
        rotation = 0, 0, 0
        scale = 1, 1, 1
    }

    EFFECTS {
        engage {
            AUDIO {
                channel = Ship
                clip = sound_vent_medium
                volume = 1.0
                pitch = 2.0
                loop = false
            }

        }

        disengage {
            AUDIO {
                channel = Ship
                clip = sound_vent_soft
                volume = 1.0
                pitch = 1.0
                loop = false
            }

        }

        flameout {
            PREFAB_PARTICLE {
                prefabName = fx_exhaustSparks_flameout_2
                transformName = thrustTransform
                oneShot = true
            }

            AUDIO {
                channel = Ship
                clip = sound_explosion_low
                volume = 1.0
                pitch = 2.0
                loop = false
            }

        }

        fx-lh2 {
            AUDIO {
                channel = Ship
                clip = sound_rocket_hard
                volume = 0.0 0.0
                volume = 1.0 1.0
                pitch = 0.0 0.2
                pitch = 1.0 1.0
                loop = true
            }

            PREFAB_PARTICLE {
                name = flame
                prefabName = fx_exhaustFlame_blue
                transformName = flameTransform
                emission = 0.0 0.0
                emission = 0.05 1.0
                emission = 0.5 3.5
                emission = 1.0 5.0
                speed = 0.0 0.5
                speed = 1.0 1.0
                localOffset = 0, 0, 0
            }

            PREFAB_PARTICLE {
                name = light
                prefabName = fx_exhaustLight_blue
                transformName = flameTransform
                emission = 0.0 0.0
                emission = 0.05 1.0
                emission = 0.5 2.0
                emission = 1.0 4.0
                speed = 0.0 0.5
                speed = 1.0 0.8
                localOffset = 0, 0, 0
            }

        }

        fx-lf {
            AUDIO {
                channel = Ship
                clip = sound_rocket_hard
                volume = 0.0 0.0
                volume = 1.0 1.0
                pitch = 0.0 0.2
                pitch = 1.0 1.0
                loop = true
            }

            PREFAB_PARTICLE {
                name = smoke
                prefabName = fx_smokeTrail_light
                transformName = smokeTransform
                emission = 0.0 0.0
                emission = 0.05 0.0
                emission = 0.075 0.25
                emission = 1.0 1.25
                speed = 0.0 0.25
                speed = 1.0 1.0
                localOffset = 0, 0, 0
            }

            PREFAB_PARTICLE {
                name = flame
                prefabName = fx_exhaustFlame_blue
                transformName = flameTransform
                emission = 0.0 0.0
                emission = 0.05 1.0
                emission = 0.5 3.5
                emission = 1.0 5.0
                speed = 0.0 0.5
                speed = 1.0 1.0
                localOffset = 0, 0, 0
            }

            PREFAB_PARTICLE {
                name = light
                prefabName = fx_exhaustLight_blue
                transformName = flameTransform
                emission = 0.0 0.0
                emission = 0.05 1.0
                emission = 0.5 2.0
                emission = 1.0 4.0
                speed = 0.0 0.5
                speed = 1.0 0.8
                localOffset = 0, 0, 0
            }

        }

    }

    MODULE {
        name = MultiModeEngine
        primaryEngineID = LF
        secondaryEngineID = LH2
        primaryEngineModeDisplayName = LiquidFuel
        secondaryEngineModeDisplayName = LiquidHydrogen
    }

    MODULE {
        name = ModuleEnginesFX
        engineID = LH2
        runningEffectName = fx-lh2
        thrustVectorTransformName = thrustTransform
        exhaustDamage = True
        ignitionThreshold = 0.1
        minThrust = 0
        maxThrust = 278
        heatProduction = 300
        fxOffset = 0, 0, 1
        EngineType = Nuclear
        exhaustDamageDistanceOffset = 1.86
        PROPELLANT {
            name = LqdHydrogen
            ratio = 1.0
            DrawGauge = True
        }

        atmosphereCurve {
            key = 0 869
            key = 1 435
            key = 2 218
            key = 10 0.001
        }

    }

    MODULE {
        name = ModuleEnginesFX
        engineID = LF
        runningEffectName = fx-lf
        thrustVectorTransformName = thrustTransform
        exhaustDamage = True
        ignitionThreshold = 0.1
        minThrust = 0
        maxThrust = 320
        heatProduction = 350
        fxOffset = 0, 0, 1
        EngineType = Nuclear
        exhaustDamageDistanceOffset = 1.86
        PROPELLANT {
            name = LiquidFuel
            ratio = 0.9
            DrawGauge = True
        }

        atmosphereCurve {
            key = 0 755
            key = 1 378
            key = 2 189
            key = 10 0.001
        }

    }

    MODULE {
        name = ModuleAlternator
        preferMultiMode = true
        RESOURCE {
            name = ElectricCharge
            rate = 8.0
        }

    }

    MODULE {
        name = ModuleGimbal
        gimbalTransformName = gimbalTransform
        gimbalRange = 4
        gimbalResponseSpeed = 6
        useGimbalResponseSpeed = true
    }

    MODULE {
        name = ModuleSurfaceFX
        thrustProviderModuleIndex = 0
        fxMax = 0.7
        maxDistance = 50
        falloff = 2.5
        thrustTransformName = thrustTransform
    }

    MODULE {
        name = ModuleJettison
        jettisonName = Shroud
        bottomNodeName = bottom
        isFairing = True
        jettisonedObjectMass = 0.1
        jettisonForce = 5
        jettisonDirection = 0 0 1
    }

    MODULE {
        name = FXModuleThrottleEffects
        fxModuleNames = heatColor
        responseSpeed = 1.0
        dependOnEngineState = True
        dependOnThrottle = True
        preferMultiMode = True
    }

    MODULE {
        name = ModuleColorChanger
        moduleID = heatColor
        animRate = 0.025
        shaderProperty = _EmissiveColor
        toggleInEditor = false
        toggleInFlight = false
        redCurve {
            key = 0 0 1 1
            key = 1 1 1 1
        }

        greenCurve {
            key = 0 0 1 1
            key = 1 1 1 1
        }

        blueCurve {
            key = 0 0 1 1
            key = 1 1 1 1
        }

        alphaCurve {
            key = 0 0 1 1
            key = 1 1 1 1
        }

    }

    MODULE {
        name = ModuleTestSubject
        useStaging = True
        useEvent = True
        situationMask = 121
        CONSTRAINT {
            type = REPEATABILITY
            value = ALWAYS
            prestige = Trivial
