        }

        CONSTRAINT {
            type = SPEED
            test = LT
            value = 2500
            situationMask = 8
            prestige = Exceptional
        }

        CONSTRAINT {
            type = SPEEDENV
            test = LT
            value = 200
            prestige = Trivial
        }

        CONSTRAINT {
            type = SPEEDENV
            test = GT
            value = 100
            prestige = Trivial
        }

        CONSTRAINT {
            type = SPEEDENV
            test = LT
            value = 100
            prestige = Significant
        }

        CONSTRAINT {
            type = SPEEDENV
            test = GT
            value = 50
            prestige = Significant
        }

        CONSTRAINT {
            type = SPEEDENV
            test = LT
            value = 50
            prestige = Exceptional
        }

        CONSTRAINT {
            type = SPEEDENV
            test = GT
            value = 20
            prestige = Exceptional
        }

    }

    NODE {
        name = top
        transform = node_stack_top
        size = 1
        method = FIXED_JOINT
        crossfeed = True
        rigid = False
    }

    NODE {
        name = bottom
        transform = node_stack_bottom
        size = 1
        method = FIXED_JOINT
        crossfeed = True
        rigid = False
    }

}

