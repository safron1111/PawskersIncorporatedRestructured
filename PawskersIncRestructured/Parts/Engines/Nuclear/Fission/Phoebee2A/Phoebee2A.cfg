        }

        CONSTRAINT {
            type = ALTITUDEENV
            test = GT
            value = 1000
            prestige = Exceptional
        }

        CONSTRAINT {
            type = ALTITUDEENV
            test = LT
            value = 2000
            prestige = Exceptional
        }

        CONSTRAINT {
            type = ALTITUDE
