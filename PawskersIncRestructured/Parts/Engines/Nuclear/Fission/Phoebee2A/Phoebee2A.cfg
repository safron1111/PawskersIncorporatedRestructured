            situationMask = 32
            body = _NotSun
        }

        CONSTRAINT {
            type = SPEED
            test = GT
            value = 0
            situationMask = 8
            prestige = Trivial
        }

        CONSTRAINT {
            type = SPEED
            test = LT
            value = 600
            situationMask = 8
            prestige = Trivial
        }

        CONSTRAINT {
            type = SPEED
            test = GT
            value = 300
            situationMask = 8
            prestige = Significant
        }

        CONSTRAINT {
            type = SPEED
