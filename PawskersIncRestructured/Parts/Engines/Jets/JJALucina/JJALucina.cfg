    MODEL {
        model = PawskersIncRestructured/Parts/Engines/Jets/JJALucina/JJALucina
        position = 0, 0, 0
        rotation = 0, 0, 0
        scale = 1, 1, 1
    }

    MODULE {
        name = ModuleEnginesFX
        engineID = Cruise
        thrustVectorTransformName = thrustTransform
        exhaustDamage = True
        ignitionThreshold = 0.1
        minThrust = 0
        maxThrust = 55
        heatProduction = 40
        useEngineResponseTime = True
        engineAccelerationSpeed = 0.12
        engineDecelerationSpeed = 0.5
        flameoutEffectName = flameout
        powerEffectName = running_thrust
        engageEffectName = engage
        disengageEffectName = disengage
        spoolEffectName = running_turbine
        engineSpoolIdle = 0.05
        engineSpoolTime = 2.0
        EngineType = Turbine
        exhaustDamageMultiplier = 5
        clampPropReceived = True
        atmChangeFlow = True
        useVelCurve = True
        useAtmCurve = True
        flameoutBar = 0.02
        flowCapMult = 1.0
        machLimit = 1.315
        machHeatMult = 12
        PROPELLANT {
            name = IntakeAir
            ignoreForIsp = True
            ratio = 88
        }

        PROPELLANT {
            name = LiquidFuel
            resourceFlowMode = STAGE_STACK_FLOW_BALANCE
            ratio = 1
            DrawGauge = True
        }

        atmosphereCurve {
            key = 0 9800 0 0
        }

        velCurve {
            key = 0 1 0 0
            key = 0.5 0.9 0 0
            key = 1 1 0.1988732 0.1988732
            key = 1.3 1.2 0 0
            key = 2 0.8 -1.065708 -1.065708
            key = 2.5 0 0 0
        }

        atmCurve {
            key = 0 0 0 0.7448742
            key = 0.072 0.13 2.075459 2.075459
            key = 0.16 0.28 1.464173 1.464173
            key = 0.42 0.578 0.93687 0.93687
            key = 1 1 0.5529748 0
        }

    }

    MODULE {
        name = ModuleAlternator
        RESOURCE {
            name = ElectricCharge
            rate = 2
        }

    }

    MODULE {
        name = ModuleSurfaceFX
        thrustProviderModuleIndex = 0
        fxMax = 0.5
        maxDistance = 20
        falloff = 2
        thrustTransformName = thrustTransform
    }

    EFFECTS {
        running_thrust {
            AUDIO {
                channel = Ship
                clip = sound_jet_deep
                volume = 0.0 0.0
                volume = 0.05 0.4
                volume = 1.0 1.5
                pitch = 0.0 0.3
                pitch = 1.0 0.5
                loop = true
            }

            PREFAB_PARTICLE {
                prefabName = fx_smokeTrail_light
                transformName = fxTransform
                emission = 0.0 0.0
                emission = 0.05 0.0
                emission = 0.075 0.25
                emission = 1.0 1.25
                speed = 0.0 0.25
                speed = 1.0 1.0
                localOffset = 0, 0, 1
                localRotation = 1, 0, 0, -90
            }

        }

        running_turbine {
            AUDIO {
                channel = Ship
                clip = sound_jet_low
                volume = 0.0 0.0
                volume = 0.05 0.2
                volume = 1.0 0.45
                pitch = 0.0 0.3
                pitch = 0.05 0.5
                pitch = 1.0 0.65
                loop = true
            }

        }

        engage {
            AUDIO {
                channel = Ship
                clip = sound_vent_medium
                volume = 1.0
                pitch = 2.0
                loop = false
            }

        }

        disengage {
            AUDIO {
                channel = Ship
                clip = sound_vent_soft
                volume = 1.0
                pitch = 2.0
                loop = false
            }

        }

        flameout {
            PREFAB_PARTICLE {
                prefabName = fx_exhaustSparks_flameout_2
                transformName = fxTransform
                oneShot = true
            }

            AUDIO {
                channel = Ship
                clip = sound_explosion_low
                volume = 1.0
                pitch = 2.0
                loop = false
            }

        }

    }

    MODULE {
        name = ModuleCargoPart
        packedVolume = 240
