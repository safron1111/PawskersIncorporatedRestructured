    category = Engine
    subcategory = 0
    title = JJ-A "Lucina" Turbofan Jet Engine
    manufacturer = Restructured Pawskers Incorporated
    description = After the acknowledgement of the dissapointment with the J-20 "Juno" developed by our competitor C7 Aerospace, Pawskers Inc. Restructured has created better engine.
    attachRules = 1,1,1,0,0
    mass = 0.325
    heatConductivity = 0.06
    skinInternalConductionMult = 4.0
    emissiveConstant = 0.8
    dragModelType = default
    maximum_drag = 0.2
    minimum_drag = 0.2
    angularDrag = 2
    crashTolerance = 7
    maxTemp = 2000
    bulkheadProfiles = size0
