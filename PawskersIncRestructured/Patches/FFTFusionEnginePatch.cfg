@PART[FeRAMorone]:NEEDS[FarFutureTechnologies,SystemHeat]:FOR[PawskersIncRestructured]
{
	MODULE
    {
        name = ModuleFusionEngine

        // General Parameters
        Enabled = False
        MinimumReactorPower = 0.05

        // Charge Parameters
        Charged = false
        ChargeRate = 10
        ChargeAmount = 0
        ChargeGoal = 2000

        // Thermal Parameters
        // must be unique
        ModuleID = fusionreactor
        // ModuleSystemHeat to link to
        HeatModuleID = reactor
        SystemPower = 750
        // The shutdown temperature of the part
        ShutdownTemperature = 1600
        // The temperature the system contributes to loops
        SystemOutletTemperature = 1400
        
        FUSIONMODE
        {
            DisplayName = #LOC_FFT_fusion-reactor_fusion-mode_d-he3
            ModeID = DH3
            ModeColor = 0.03, 0.45, 0.36, 0.5
            PowerGeneration = 800
            INPUT_RESOURCE
            {
                ResourceName = LqdDeuterium
                Ratio = 2.18E-07
                FlowMode = STAGE_PRIORITY_FLOW
            }
            INPUT_RESOURCE
            {
                ResourceName = LqdHe3
                Ratio = 8.72E-07
                FlowMode = STAGE_PRIORITY_FLOW
            }
        }
    }
}