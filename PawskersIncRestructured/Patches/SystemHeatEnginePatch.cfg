@PART[FeRAMorone]:NEEDS[SystemHeat]:FOR[PawskersIncRestructured]
{
	MODULE
    {
        name = ModuleSystemHeat
        // Cubic metres
        volume = 1.2
        moduleID = reactor
        iconName = Icon_Atom
    }
    MODULE
    {
        name = ModuleSystemHeatEngine
        // must be unique
        moduleID = lh2Heat
        // ModuleSystemHeat to link to
        systemHeatModuleID = reactor
        engineModuleID = LH2
        // in KW at peak output
        systemPower = 3000

        // Nominal system output temperature
        systemOutletTemperature = 1200
        // Valid system temperature range
        temperatureCurve
        {
            key = 0 1.0
            key = 1200 1.0
            key = 2000 0.0
        }
    }
    MODULE
    {
        name = ModuleSystemHeatEngine
        // must be unique
        moduleID = lfHeat
        // ModuleSystemHeat to link to
        systemHeatModuleID = reactor
        engineModuleID = LF
        // in KW at peak output
        systemPower = 2000

        // Nominal system output temperature
        systemOutletTemperature = 1200
        // Valid system temperature range
        temperatureCurve
        {
            key = 0 1.0
            key = 1200 1.0
            key = 2000 0.0
        }
    }
}

@PART[FeRBMoray]:NEEDS[SystemHeat]:FOR[PawskersIncRestructured]
{
	MODULE
    {
        name = ModuleSystemHeat
        volume = 3.2
        moduleID = reactor
        iconName = Icon_Atom
    }
    MODULE
    {
        name = ModuleSystemHeatEngine
        moduleID = FusionOnlyHeat
        systemHeatModuleID = reactor
        engineModuleID = FusionOnly
        systemPower = 16000
        systemOutletTemperature = 1400
        shutdownTemperature = 1800
        temperatureCurve
        {
            key = 0 0
            key = 1000 0 0 0
            key = 1300 0.5
            key = 1400 1
            key = 1500 0.5
            key = 1800 0 0 0
        }
    }
    MODULE
    {
        name = ModuleSystemHeatEngine
        moduleID = AfterburningHeat
        systemHeatModuleID = reactor
        engineModuleID = Afterburning
        systemPower = 14000
        systemOutletTemperature = 1400
        shutdownTemperature = 1800
        temperatureCurve
        {
            key = 0 0
            key = 1000 0 0 0
            key = 1300 0.5
            key = 1400 1
            key = 1500 0.5
            key = 1800 0 0 0
        }
    }
}